<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K8s 工作负载控制器对比</title>
<style>
  :root {
    --bg: #1e1e2e;
    --fg: #cdd6f4;
    --muted: #6c7086;
    --surface: #181825;
    --border: #45475a;
    --overlay: #313244;
    --green: #a6e3a1;
    --red: #f38ba8;
    --blue: #89b4fa;
    --yellow: #f9e2af;
    --mauve: #cba6f7;
    --peach: #fab387;
  }
  .light {
    --bg: #eff1f5;
    --fg: #4c4f69;
    --muted: #8c8fa1;
    --surface: #e6e9ef;
    --border: #ccd0da;
    --overlay: #dce0e8;
    --green: #40a02b;
    --red: #d20f39;
    --blue: #1e66f5;
    --yellow: #df8e1d;
    --mauve: #8839ef;
    --peach: #fe640b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
    min-height: 100vh;
  }

  h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--blue);
    margin-bottom: 14px;
    letter-spacing: 0.02em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    border-color: var(--blue);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  .card.active {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 2px var(--accent-color-alpha);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .card-icon {
    font-size: 20px;
    line-height: 1;
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .card-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 99px;
    letter-spacing: 0.03em;
  }

  .expand-hint {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
  }

  /* Detail Panel */
  .detail-panel {
    background: var(--overlay);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }

  .detail-panel.visible {
    display: block;
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .detail-title {
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 8px;
    transition: color 0.1s, border-color 0.1s;
  }

  .close-btn:hover {
    color: var(--fg);
    border-color: var(--fg);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 500px) {
    .detail-grid { grid-template-columns: 1fr; }
  }

  .detail-section h4 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .detail-section ul {
    list-style: none;
    padding: 0;
  }

  .detail-section ul li {
    font-size: 12px;
    color: var(--fg);
    padding: 3px 0;
    padding-left: 14px;
    position: relative;
  }

  .detail-section ul li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--muted);
    font-size: 10px;
    top: 4px;
  }

  /* YAML toggle */
  .yaml-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .yaml-toggle-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    transition: background 0.1s, border-color 0.1s;
  }

  .yaml-toggle-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--surface);
  }

  .yaml-block {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--fg);
    overflow-x: auto;
    white-space: pre;
  }

  .yaml-block.visible {
    display: block;
  }

  .yaml-key { color: var(--blue); }
  .yaml-val { color: var(--green); }
  .yaml-comment { color: var(--muted); font-style: italic; }
  .yaml-str { color: var(--yellow); }
  .yaml-kind { color: var(--mauve); font-weight: 700; }

  /* Replica diagram */
  .replica-diagram {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .node-box {
    background: var(--overlay);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    text-align: center;
    font-size: 10px;
    min-width: 52px;
  }

  .node-label {
    color: var(--muted);
    font-size: 9px;
    margin-bottom: 4px;
  }

  .pod-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin: 1px;
    vertical-align: middle;
  }

  .pod-green { background: var(--green); }
  .pod-blue { background: var(--blue); }
  .pod-peach { background: var(--peach); }
  .pod-mauve { background: var(--mauve); }

  .footer-note {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h2>K8s 工作负载控制器对比</h2>

<div class="grid" id="cardGrid"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-title" id="detailTitle"></div>
    <button class="close-btn" onclick="closeDetail()">关闭 ✕</button>
  </div>
  <div class="detail-grid">
    <div class="detail-section" id="detailScenarios">
      <h4>适用场景</h4>
      <ul id="detailScenariosList"></ul>
    </div>
    <div class="detail-section" id="detailAI">
      <h4>AI 基础设施用例</h4>
      <ul id="detailAIList"></ul>
    </div>
  </div>
  <div class="detail-section" id="detailReplicaDiagram" style="margin-bottom:12px;"></div>
  <div class="yaml-toggle">
    <span style="font-size:11px;color:var(--muted);">YAML 示例</span>
    <button class="yaml-toggle-btn" id="yamlBtn" onclick="toggleYaml()">显示</button>
  </div>
  <div class="yaml-block" id="yamlBlock"></div>
</div>

<div class="footer-note">点击卡片查看详情 · 点击「显示」查看 YAML 示例</div>

  {
    id: 'job',
    icon: '⚙️',

    ],
    aiUseCases: [
      '模型微调训练（单次运行）',
      '大规模批量推理（数据集处理）',
      '数据预处理 / 特征工程 Pipeline',
      '模型量化、导出 ONNX',
    ],
    replicaDiagram: 'job',
    yaml: `<span class="yaml-key">apiVersion:</span> <span class="yaml-val">batch/v1</span>
<span class="yaml-kind">kind:</span> <span class="yaml-val">Job</span>
<span class="yaml-key">metadata:</span>
  <span class="yaml-key">name:</span> <span class="yaml-val">model-finetuning</span>
<span class="yaml-key">spec:</span>
  <span class="yaml-key">completions:</span> <span class="yaml-val">1</span>
  <span class="yaml-key">parallelism:</span> <span class="yaml-val">1</span>

// ─── 2. Diagram builder ──────────────────────────────────────────────────────

function buildDiagram(type) {
  const nodes = [
    { label: 'Node 1', pods: [] },
    { label: 'Node 2', pods: [] },
    { label: 'Node 3', pods: [] },
    { label: 'Node 4', pods: [] },
  ];

  if (type === 'replicaset' || type === 'deployment') {
    nodes[0].pods = ['pod-green'];
    nodes[1].pods = ['pod-green', 'pod-green'];
    nodes[2].pods = [];
    nodes[3].pods = ['pod-green'];
  } else if (type === 'daemonset') {
    nodes.forEach(n => { n.pods = ['pod-blue']; });
  } else if (type === 'job') {
    nodes[0].pods = ['pod-peach'];
    nodes[1].pods = ['pod-peach', 'pod-peach'];
    nodes[2].pods = [];
    nodes[3].pods = [];
  } else if (type === 'cronjob') {
    nodes[0].pods = ['pod-mauve'];
    nodes[1].pods = ['pod-mauve'];
    nodes[2].pods = [];
    nodes[3].pods = [];
  } else if (type === 'statefulset') {
    nodes[0].pods = ['pod-peach'];
    nodes[1].pods = ['pod-peach'];
    nodes[2].pods = ['pod-peach'];
    nodes[3].pods = [];
  }

  const labels = {
    replicaset: 'ReplicaSet: 4 副本，随机分布',
    deployment: 'Deployment → ReplicaSet: 4 副本，支持滚动更新',
    daemonset: 'DaemonSet: 每节点 1 个，共 4 个',
    job: 'Job: 3 次完成任务（completions=3, parallelism=2）',
    cronjob: 'CronJob → 定时创建 Job（schedule: "0 2 * * *"）',
    statefulset: 'StatefulSet: 3 有序副本（milvus-0, milvus-1, milvus-2）',
  };

  let html = `<h4 style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;">副本分布示意</h4>`;
  html += `<div class="replica-diagram">`;
  for (const node of nodes) {
    html += `<div class="node-box">`;
    html += `<div class="node-label">${node.label}</div>`;
    if (node.pods.length === 0) {
      html += `<span style="color:var(--muted);font-size:10px;">–</span>`;
    } else {
      for (const pod of node.pods) {
        html += `<span class="pod-dot ${pod}"></span>`;
      }
    }
    html += `</div>`;
  }
  html += `</div>`;
  html += `<p style="font-size:10px;color:var(--muted);margin-top:6px;">${labels[type] || ''}</p>`;
  return html;
}

// ─── 3. Render functions ─────────────────────────────────────────────────────

let activeId = null;
let yamlVisible = false;

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  for (const c of controllers) {
    const isActive = c.id === activeId;
    const card = document.createElement('div');
    card.className = 'card' + (isActive ? ' active' : '');
    card.style.setProperty('--accent-color', c.accentColor);
    card.style.setProperty('--accent-color-alpha', c.accentAlpha);
    if (isActive) {
      card.style.borderColor = c.accentColor;
      card.style.boxShadow = `0 0 0 2px ${c.accentAlpha}`;
    }
    card.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${c.icon}</span>
        <span class="card-title" style="color:${c.accentColor}">${c.title}</span>
      </div>
      <div class="card-subtitle">${c.subtitle}</div>
      <span class="badge" style="background:${c.badgeBg};color:var(--surface)">${c.badge}</span>
      <div class="expand-hint">${isActive ? '点击收起' : '点击展开 →'}</div>
    `;
    card.onclick = () => toggleDetail(c.id);
    grid.appendChild(card);
  }
}

function toggleDetail(id) {
  if (activeId === id) {
    activeId = null;
    closeDetail();
  } else {
    activeId = id;
    yamlVisible = false;
    showDetail(id);
  }
  renderCards();
}

function showDetail(id) {
  const c = controllers.find(x => x.id === id);
  if (!c) return;

  document.getElementById('detailTitle').innerHTML = `<span>${c.icon}</span><span style="color:${c.accentColor}">${c.title}</span>`;

  const scenariosList = document.getElementById('detailScenariosList');
  scenariosList.innerHTML = c.scenarios.map(s => `<li>${s}</li>`).join('');

  const aiList = document.getElementById('detailAIList');
  aiList.innerHTML = c.aiUseCases.map(s => `<li>${s}</li>`).join('');

  document.getElementById('detailReplicaDiagram').innerHTML = buildDiagram(c.replicaDiagram);

  const yamlBlock = document.getElementById('yamlBlock');
  yamlBlock.innerHTML = c.yaml;
  yamlBlock.classList.remove('visible');

  const yamlBtn = document.getElementById('yamlBtn');
  yamlBtn.classList.remove('active');
  yamlBtn.textContent = '显示';

  document.getElementById('detailPanel').classList.add('visible');

  // Scroll into view smoothly
  try {
    document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {}
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPanel').classList.remove('visible');
  yamlVisible = false;
  renderCards();
}

function toggleYaml() {
  yamlVisible = !yamlVisible;
  const yamlBlock = document.getElementById('yamlBlock');
  const yamlBtn = document.getElementById('yamlBtn');
  if (yamlVisible) {
    yamlBlock.classList.add('visible');
    yamlBtn.classList.add('active');
    yamlBtn.textContent = '隐藏';
  } else {
    yamlBlock.classList.remove('visible');
    yamlBtn.classList.remove('active');
    yamlBtn.textContent = '显示';
  }
}

// ─── 4. Theme sync and initial render LAST ──────────────────────────────────

function syncTheme() {
  try {
    const html = window.parent.document.documentElement;
    document.body.classList.toggle('light', !html.classList.contains('dark'));
  } catch(e) {}
  renderCards();
}

syncTheme();

try {
  new MutationObserver(syncTheme).observe(
    window.parent.document.documentElement,
    { attributes: true, attributeFilter: ['class'] }
  );
} catch(e) {}
</script>
</body>
