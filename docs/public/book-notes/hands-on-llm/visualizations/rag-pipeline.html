<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 完整管线动画</title>
<style>
:root {
  --bg:#1e1e2e; --fg:#cdd6f4; --muted:#6c7086; --surface:#181825;
  --border:#45475a; --overlay:#313244; --green:#a6e3a1; --red:#f38ba8;
  --blue:#89b4fa; --yellow:#f9e2af; --mauve:#cba6f7; --peach:#fab387;
  --teal:#94e2d5; --sky:#89dceb
}
.light {
  --bg:#eff1f5; --fg:#4c4f69; --muted:#8c8fa1; --surface:#e6e9ef;
  --border:#ccd0da; --overlay:#dce0e8; --green:#40a02b; --red:#d20f39;
  --blue:#1e66f5; --yellow:#df8e1d; --mauve:#8839ef; --peach:#fe640b;
  --teal:#179299; --sky:#04a5e5
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 12px;
  padding: 14px;
  min-height: 100vh;
}
h2 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.subtitle { color: var(--muted); font-size: 11px; margin-bottom: 12px; }

.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.btn {
  background: var(--blue);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 11px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  background: var(--overlay);
  color: var(--fg);
  border: 1px solid var(--border);
}
.toggle-label {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  user-select: none;
}
.toggle-label input { cursor: pointer; }
.step-indicator {
  margin-left: auto;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.pipeline {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.stage {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  opacity: 0.35;
  transition: opacity 0.4s, border-color 0.4s, background 0.4s;
}
.stage.active {
  opacity: 1;
  border-color: var(--blue);
  background: color-mix(in srgb, var(--blue) 10%, var(--surface));
}
.stage.done {
  opacity: 0.9;
  border-color: var(--green);
}

.stage-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.stage-num {
  font-size: 10px;
  font-weight: 700;
  background: var(--overlay);
  color: var(--muted);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0;
}
.stage.active .stage-num { background: var(--blue); color: var(--bg); }
.stage.done .stage-num { background: var(--green); color: var(--bg); }
.stage-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.stage-desc { color: var(--muted); font-size: 10px; margin-left: auto; }

.stage-body {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 36px;
}

/* Query box */
.query-box {
  background: var(--overlay);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--fg);
  flex-shrink: 0;
}
.arrow {
  color: var(--muted);
  font-weight: 700;
}

/* Vector visualization */
.vec {
  display: inline-flex;
  gap: 1px;
  background: var(--overlay);
  padding: 4px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.vec-cell {
  width: 7px;
  height: 14px;
  background: var(--blue);
  border-radius: 1px;
  transition: opacity 0.3s;
}

/* Doc list */
.doc-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  flex: 1;
}
.doc-item {
  display: flex;
  gap: 6px;
  background: var(--overlay);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 10px;
  align-items: center;
  transition: background 0.3s, border-color 0.3s;
}
.doc-item.top {
  border-color: var(--green);
  background: color-mix(in srgb, var(--green) 12%, var(--overlay));
}
.doc-item.dropped {
  opacity: 0.3;
  text-decoration: line-through;
}
.doc-rank {
  font-size: 9px;
  color: var(--muted);
  font-weight: 700;
  min-width: 18px;
}
.doc-text { flex: 1; }
.doc-score {
  font-size: 9px;
  color: var(--blue);
  font-family: inherit;
  min-width: 46px;
  text-align: right;
}
.doc-item.top .doc-score { color: var(--green); }

/* Prompt box */
.prompt-box {
  background: var(--overlay);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 10px;
  flex: 1;
  white-space: pre-wrap;
  line-height: 1.5;
  color: var(--fg);
}
.prompt-box .ph {
  background: color-mix(in srgb, var(--mauve) 25%, transparent);
  border-radius: 3px;
  padding: 0 3px;
  color: var(--mauve);
  font-weight: 700;
}
.prompt-box .ctx {
  background: color-mix(in srgb, var(--peach) 18%, transparent);
  border-radius: 3px;
  padding: 1px 3px;
  color: var(--peach);
}

/* Answer box */
.answer-box {
  background: color-mix(in srgb, var(--green) 10%, var(--surface));
  border: 1px solid var(--green);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 10px;
  flex: 1;
  line-height: 1.55;
}
.answer-box .cite {
  color: var(--blue);
  font-weight: 700;
  font-size: 9px;
}

.cursor {
  display: inline-block;
  width: 6px;
  height: 12px;
  background: var(--green);
  vertical-align: middle;
  margin-left: 1px;
  animation: blink 0.8s infinite;
}
@keyframes blink { 0%,50% {opacity:1;} 51%,100% {opacity:0;} }
</style>
</head>
<body>

<h2>RAG 完整管线动画</h2>
<p class="subtitle">Query → Embed → Vector Search → Rerank（可选）→ Prompt → LLM Generate</p>

<div class="controls">
  <button class="btn" id="btn-next">下一步 ▶</button>
  <button class="btn btn-secondary" id="btn-reset">重置</button>
  <label class="toggle-label">
    <input type="checkbox" id="use-rerank" checked>
    启用 Reranker
  </label>
  <span class="step-indicator" id="step-ind">Step 0 / 5</span>
</div>

<div class="pipeline" id="pipeline"></div>

<script>
// ---------- Data & State ----------
const USER_QUERY = "How precise was the science in Interstellar?";

const CANDIDATES = [
  { text: "It has also received praise from astronomers for scientific accuracy", score: 0.92, rerank: 0.97 },
  { text: "Caltech theoretical physicist Kip Thorne acted as a scientific consultant", score: 0.81, rerank: 0.85 },
  { text: "Interstellar uses extensive practical and miniature effects",         score: 0.76, rerank: 0.43 },
  { text: "The film had a worldwide gross over $677 million",                   score: 0.71, rerank: 0.22 },
  { text: "Interstellar premiered on October 26, 2014, in Los Angeles",         score: 0.68, rerank: 0.18 },
  { text: "Principal photography began in late 2013 in Alberta and Iceland",     score: 0.64, rerank: 0.12 },
  { text: "Brothers Christopher and Jonathan Nolan wrote the screenplay",        score: 0.59, rerank: 0.08 },
  { text: "Cinematographer Hoyte van Hoytema shot it on 35 mm movie film",       score: 0.55, rerank: 0.06 },
];

const FINAL_ANSWER = "Interstellar is widely praised by astronomers for its scientific accuracy[1]. Caltech physicist Kip Thorne served as scientific consultant[2], ensuring the portrayal of theoretical astrophysics is rigorous.";

let step = 0;

// ---------- Render ----------
const pipeline = document.getElementById('pipeline');
const stepInd = document.getElementById('step-ind');
const btnNext = document.getElementById('btn-next');
const btnReset = document.getElementById('btn-reset');
const rerankToggle = document.getElementById('use-rerank');

function vecHTML(n=16, dim=true) {
  let s = '<div class="vec">';
  for (let i=0; i<n; i++) {
    const o = dim ? 0.25 + Math.random()*0.75 : 0.5;
    s += `<div class="vec-cell" style="opacity:${o.toFixed(2)}"></div>`;
  }
  s += '</div>';
  return s;
}

function render() {
  const useRerank = rerankToggle.checked;
  const maxStep = useRerank ? 5 : 4;
  stepInd.textContent = `Step ${Math.min(step, maxStep)} / ${maxStep}`;
  btnNext.disabled = step >= maxStep;

  // Compute top candidates after stage 2
  const top10 = [...CANDIDATES].sort((a,b)=>b.score-a.score);
  const topAfterRerank = [...top10].sort((a,b)=>b.rerank-a.rerank).slice(0,3);
  const topAfterNoRerank = top10.slice(0,3);
  const finalTop = useRerank ? topAfterRerank : topAfterNoRerank;

  const stages = [];

  // Stage 1: Query Encoding
  stages.push({
    num: 1,
    title: 'Query Encoding',
    desc: 'Embed the user query with the encoder model',
    active: step === 1,
    done: step > 1,
    visible: step >= 1,
    html: `
      <div class="query-box">${USER_QUERY}</div>
      <span class="arrow">→</span>
      <span style="color:var(--muted);font-size:10px">Encoder</span>
      <span class="arrow">→</span>
      ${vecHTML(24)}
    `
  });

  // Stage 2: Vector Search
  const searchList = step >= 2 ? top10.slice(0,8) : [];
  stages.push({
    num: 2,
    title: 'Vector Search (Top-K retrieval)',
    desc: `ANN 查找语料库里最接近的 ${top10.length > 8 ? 8 : top10.length} 条（完整库 1M+）`,
    active: step === 2,
    done: step > 2,
    visible: step >= 2,
    html: `
      <div class="doc-list">
        ${searchList.map((d,i)=>`
          <div class="doc-item">
            <span class="doc-rank">#${i+1}</span>
            <span class="doc-text">${d.text}</span>
            <span class="doc-score">sim=${d.score.toFixed(2)}</span>
          </div>
        `).join('')}
      </div>
    `
  });

  // Stage 3: Reranker (conditional)
  if (useRerank) {
    const rrList = step >= 3 ? top10.slice(0,8) : [];
    const rrSorted = step >= 3 ? [...rrList].sort((a,b)=>b.rerank-a.rerank) : [];
    stages.push({
      num: 3,
      title: 'Cross-Encoder Reranker',
      desc: '把 Top-8 送进 cross-encoder 重新打分，挑出 Top-3',
      active: step === 3,
      done: step > 3,
      visible: step >= 3,
      html: `
        <div class="doc-list">
          ${rrSorted.map((d,i)=>{
            const isTop = i < 3;
            return `
              <div class="doc-item ${isTop?'top':'dropped'}">
                <span class="doc-rank">#${i+1}</span>
                <span class="doc-text">${d.text}</span>
                <span class="doc-score">rr=${d.rerank.toFixed(2)}</span>
              </div>
            `;
          }).join('')}
        </div>
      `
    });
  }

  // Stage: Prompt Construction
  const promptStep = useRerank ? 4 : 3;
  const promptVisibleStep = useRerank ? 4 : 3;
  stages.push({
    num: useRerank ? 4 : 3,
    title: 'Prompt Construction',
    desc: '把 Top-3 chunks 填进 prompt 模板',
    active: step === promptVisibleStep,
    done: step > promptVisibleStep,
    visible: step >= promptVisibleStep,
    html: `
      <div class="prompt-box">Answer the question using the relevant context below.

<span class="ph">Context:</span>
${finalTop.map((d,i)=>`<span class="ctx">[${i+1}] ${d.text}</span>`).join('\n')}

<span class="ph">Question:</span> ${USER_QUERY}

<span class="ph">Answer:</span></div>
    `
  });

  // Stage: LLM Generation
  const genStep = useRerank ? 5 : 4;
  const genDone = step > genStep;
  const showCursor = step === genStep;
  const answerHTML = step >= genStep
    ? FINAL_ANSWER.replace(/\[(\d+)\]/g,'<span class="cite">[$1]</span>') + (showCursor?'<span class="cursor"></span>':'')
    : '';
  stages.push({
    num: useRerank ? 5 : 4,
    title: 'LLM Generation',
    desc: 'LLM 基于检索到的 context 生成答案并附引用',
    active: step === genStep,
    done: genDone,
    visible: step >= genStep,
    html: `
      <div class="answer-box">${answerHTML || '<span style="color:var(--muted);font-style:italic">(waiting for generation)</span>'}</div>
    `
  });

  pipeline.innerHTML = stages.map(s=>`
    <div class="stage ${s.active?'active':''} ${s.done?'done':''}" style="${s.visible?'':'opacity:0.2'}">
      <div class="stage-header">
        <span class="stage-num">${s.num}</span>
        <span class="stage-title">${s.title}</span>
        <span class="stage-desc">${s.desc}</span>
      </div>
      <div class="stage-body">${s.html}</div>
    </div>
  `).join('');
}

// ---------- Events ----------
btnNext.addEventListener('click', ()=>{
  const maxStep = rerankToggle.checked ? 5 : 4;
  if (step < maxStep) step++;
  render();
});
btnReset.addEventListener('click', ()=>{
  step = 0;
  render();
});
rerankToggle.addEventListener('change', ()=>{
  step = 0;
  render();
});

// ---------- Theme sync (LAST) ----------
function syncTheme() {
  try {
    const html = window.parent.document.documentElement;
    document.body.classList.toggle('light', !html.classList.contains('dark'));
  } catch(e) {}
  render();
}
syncTheme();
try {
  new MutationObserver(syncTheme).observe(
    window.parent.document.documentElement,
    { attributes: true, attributeFilter: ['class'] }
  );
} catch(e) {}
</script>

</body>
</html>
