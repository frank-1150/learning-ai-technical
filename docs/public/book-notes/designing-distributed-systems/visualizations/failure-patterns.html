<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Failure Patterns Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1e1e2e; --fg: #cdd6f4; --muted: #6c7086;
  --surface: #181825; --border: #45475a; --overlay: #313244;
  --green: #a6e3a1; --red: #f38ba8; --blue: #89b4fa; --yellow: #f9e2af; --mauve: #cba6f7; --peach: #fab387;
}
.light {
  --bg: #eff1f5; --fg: #4c4f69; --muted: #8c8fa1;
  --surface: #e6e9ef; --border: #ccd0da; --overlay: #dce0e8;
  --green: #40a02b; --red: #d20f39; --blue: #1e66f5; --yellow: #df8e1d; --mauve: #8839ef; --peach: #fe640b;
}
body {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  background: var(--bg); color: var(--fg); padding: 16px;
  transition: background 0.3s, color 0.3s;
}
.container { max-width: 820px; margin: 0 auto; }
h2 { font-size: 15px; text-align: center; margin-bottom: 6px; font-weight: 600; }
.subtitle { text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 16px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
.card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px;
  padding: 12px; cursor: pointer; transition: all 0.25s; position: relative;
  overflow: hidden;
}
.card:hover { border-color: var(--muted); transform: translateY(-1px); }
.card.expanded {
  grid-column: 1 / -1; border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.card-num {
  width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0;
  background: var(--overlay); color: var(--muted);
}
.card.expanded .card-num { background: var(--accent); color: var(--bg); }
.card-title { font-size: 12px; font-weight: 700; line-height: 1.3; }
.card-brief { font-size: 10px; color: var(--muted); line-height: 1.5; }
.card-expanded-content { display: none; margin-top: 12px; }
.card.expanded .card-expanded-content { display: block; }
.section-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.section-text { font-size: 11px; line-height: 1.7; margin-bottom: 12px; color: var(--fg); }
.mitigation {
  background: var(--overlay); border-radius: 6px; padding: 10px 12px;
  border-left: 3px solid var(--green);
}
.mitigation .section-label { color: var(--green); }
.mitigation .section-text { margin-bottom: 0; }
.card-close {
  position: absolute; top: 8px; right: 10px; font-size: 14px;
  color: var(--muted); cursor: pointer; display: none; line-height: 1;
}
.card.expanded .card-close { display: block; }
.hint { text-align: center; font-size: 10px; color: var(--muted); margin-top: 12px; }

.c0 { --accent: var(--red); }
.c1 { --accent: var(--peach); }
.c2 { --accent: var(--yellow); }
.c3 { --accent: var(--blue); }
.c4 { --accent: var(--mauve); }
.c5 { --accent: var(--red); }
.c6 { --accent: var(--peach); }
.c7 { --accent: var(--blue); }
.c8 { --accent: var(--yellow); }
</style>
</head>
<body>
<div class="container">
  <h2>分布式系统九大常见故障模式</h2>
  <div class="subtitle">Chapter 16 -- 点击卡片展开详情</div>
  <div class="grid" id="grid"></div>
  <div class="hint">源自多年分布式系统开发、运营与调试的经验总结</div>
</div>

<script>
var patterns = [
  {
    num: 1, title: '惊群效应',
    en: 'Thundering Herd',
    brief: '失败重试导致流量指数级放大',
    example: '服务过载 -> X 个请求超时 -> 重试产生 2X 请求 -> 下一轮 4X -> 系统崩溃。多级微服务链路中，重试放大效应更加剧烈。',
    mitigation: '指数退避（每次失败加倍等待）+ Jitter（随机抖动防止"集体冲锋"）+ 熔断器（错误率过高时直接切断）+ 恢复时渐进放入流量'
  },
  {
    num: 2, title: '无错误即错误',
    en: 'Absence of Errors',
    brief: '错误率为零可能意味着系统已停止处理请求',
    example: '视频字幕系统的上传组件丢失权限，无法上传视频。错误率为 0%（因为没有请求被处理），但系统实际已完全故障。',
    mitigation: '同时监控"过多错误"和"过少请求/错误"。健康的系统通常有一定比例的环境错误（由重试等机制处理）。'
  },
  {
    num: 3, title: '"客户端"错误陷阱',
    en: '"Client" / "Expected" Errors',
    brief: '把应该关注的问题归类为"不是我的问题"',
    example: '所有 401 错误都被归为"客户端错误"而忽略。但如果突然所有用户都 401，那是认证服务挂了。',
    mitigation: '对客户端错误做异常检测 + 使用合成请求（synthetic requests）监控，合成请求不应有任何"客户端"错误'
  },
  {
    num: 4, title: '版本化错误',
    en: 'Versioning Errors',
    brief: 'API 内外部表示耦合，迭代时进退两难',
    example: '内部数据格式变更直接影响 API 契约，导致所有客户端必须同步更新，否则无法工作。',
    mitigation: '分离三层版本：外部 API 版本、内部内存表示、存储层格式。在各层之间维护翻译逻辑。初期看似复杂，长期回报巨大。'
  },
  {
    num: 5, title: '"可选"组件的神话',
    en: 'Myth of Optional Components',
    brief: '缓存等"可选"组件悄然成为不可或缺的依赖',
    example: '缓存刚加入时只是性能优化。随着负载增长，系统已无法在没有缓存的情况下达到性能目标，但运维标准仍按"可选"对待。',
    mitigation: '一旦添加组件就视为必选。本地缓存尤其危险——规模增长后内存消耗会失控。对所有组件按关键依赖标准运维。'
  },
  {
    num: 6, title: '"清理了所有东西"',
    en: '"Cleaned Up" Everything',
    brief: '故障状态下组件交互导致灾难性数据丢失',
    example: '照片存储系统：数据库不可用时 API 返回 404，垃圾回收系统误认为所有用户都不存在，删除了所有照片。',
    mitigation: '为删除操作添加限流 + 熔断器（异常删除率时停止）。考虑故障模式下每个组件的交互行为，而非仅考虑正常情况。'
  },
  {
    num: 7, title: '输入广度挑战',
    en: 'Breadth of Inputs',
    brief: '测试无法覆盖近乎无限的输入空间',
    example: '某些 bug 只在特定输入组合下 100% 复现，但这些组合极其罕见，通过常规测试几乎不可能发现（"编译器问题"）。',
    mitigation: '录制真实用户输入用于回归测试（注意地域和时间覆盖）+ Fuzz 测试生成随机有效输入。LLM 可以帮助生成更智能的 Fuzz 数据。'
  },
  {
    num: 8, title: '处理过时工作',
    en: 'Processing Obsolete Work',
    brief: '故障恢复后积压的过时请求拖慢整个系统',
    example: '图片识别服务故障 10 分钟后恢复，积压了大量请求。系统满载处理这些过时请求，导致新请求延迟数小时。',
    mitigation: '三管齐下：1) 请求超时机制，过期即丢弃；2) 基于延迟的自动扩缩容；3) 优先处理新请求（triage），放弃过旧的请求。'
  },
  {
    num: 9, title: '"第二系统"问题',
    en: '"Second System" Problem',
    brief: '推倒重来的新系统永远追不上持续演化的老系统',
    example: '新系统开发 6 个月"完成"时，老系统已增加了 6 个月的功能和修复。新系统永远在追赶，且缺乏生产里程数。',
    mitigation: '利用微服务架构逐个替换组件，而非全量重写。投资抽象层分离业务逻辑与基础设施，使存储等层可独立迭代。'
  }
];

var expandedIdx = -1;
var gridEl = document.getElementById('grid');

function renderCards() {
  gridEl.innerHTML = patterns.map(function(p, i) {
    var isExp = i === expandedIdx;
    return '<div class="card c' + i + (isExp ? ' expanded' : '') + '" onclick="toggle(' + i + ')">' +
      '<span class="card-close" onclick="event.stopPropagation();toggle(-1)">x</span>' +
      '<div class="card-header">' +
        '<span class="card-num">' + p.num + '</span>' +
        '<span class="card-title">' + p.title + '</span>' +
      '</div>' +
      '<div class="card-brief">' + (isExp ? p.en : p.brief) + '</div>' +
      '<div class="card-expanded-content">' +
        '<div class="section-label">Real-world scenario</div>' +
        '<div class="section-text">' + p.example + '</div>' +
        '<div class="mitigation">' +
          '<div class="section-label">Mitigation</div>' +
          '<div class="section-text">' + p.mitigation + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggle(i) {
  expandedIdx = expandedIdx === i ? -1 : i;
  renderCards();
  if (expandedIdx >= 0) {
    var card = gridEl.querySelectorAll('.card')[expandedIdx];
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function render() {
  renderCards();
}

function syncTheme() {
  try {
    var html = window.parent.document.documentElement;
    var isDark = html.classList.contains('dark');
    document.body.classList.toggle('light', !isDark);
  } catch(e) {}
  render();
}
syncTheme();
try { new MutationObserver(syncTheme).observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['class'] }); } catch(e) {}
</script>
</body>
</html>
