<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Consistency Spectrum</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1e1e2e; --fg: #cdd6f4; --muted: #6c7086;
    --surface: #181825; --border: #45475a; --overlay: #313244;
    --green: #a6e3a1; --red: #f38ba8; --blue: #89b4fa; --yellow: #f9e2af; --mauve: #cba6f7;
  }
  .light {
    --bg: #eff1f5; --fg: #4c4f69; --muted: #8c8fa1;
    --surface: #e6e9ef; --border: #ccd0da; --overlay: #dce0e8;
    --green: #40a02b; --red: #d20f39; --blue: #1e66f5; --yellow: #df8e1d; --mauve: #8839ef;
  }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg); color: var(--fg); padding: 20px;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 820px; margin: 0 auto; }
  .title { text-align: center; font-size: 15px; font-weight: bold; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .slider-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }

  .spectrum-bar {
    position: relative; height: 12px; border-radius: 6px; margin: 0 0 8px;
    background: linear-gradient(to right, var(--green), var(--yellow), var(--red));
    opacity: 0.7;
  }
  .spectrum-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 16px; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
    background: transparent; outline: none; margin: 8px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 22px; height: 22px;
    border-radius: 50%; background: var(--blue); border: 3px solid var(--bg);
    cursor: pointer; box-shadow: 0 0 8px rgba(137,180,250,0.5);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%; background: var(--blue);
    border: 3px solid var(--bg); cursor: pointer;
  }

  .level-label { text-align: center; font-size: 14px; font-weight: bold; margin: 12px 0 4px; }
  .level-desc { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 0; }
  .metric { background: var(--overlay); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .metric-bar-bg { height: 6px; background: var(--surface); border-radius: 3px; margin-bottom: 6px; overflow: hidden; }
  .metric-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .metric-value { font-size: 12px; font-weight: bold; }

  .details { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-card { background: var(--overlay); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .detail-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 12px; line-height: 1.6; }

  .cap-bar {
    margin-top: 16px; padding: 12px; border-radius: 8px;
    background: var(--overlay); border: 1px solid var(--border);
    text-align: center; font-size: 12px;
  }
  .cap-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .cap-items { display: flex; justify-content: center; gap: 16px; }
  .cap-item { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; }
  .cap-on { background: rgba(166,227,161,0.15); color: var(--green); border: 1px solid var(--green); }
  .cap-off { background: var(--surface); color: var(--muted); border: 1px solid var(--border); opacity: 0.6; }
</style>
</head>
<body>
<div class="container">
  <div class="title">数据一致性频谱</div>
  <div class="subtitle">拖动滑块探索从最终一致性到强一致性的权衡</div>

  <div class="slider-section">
    <div class="spectrum-bar"></div>
    <div class="spectrum-labels">
      <span>Eventual</span>
      <span>Causal</span>
      <span>Session</span>
      <span>Bounded</span>
      <span>Strong</span>
    </div>
    <input type="range" id="slider" min="0" max="4" value="0" step="1">
    <div class="level-label" id="level-label"></div>
    <div class="level-desc" id="level-desc"></div>
    <div class="metrics" id="metrics"></div>
  </div>

  <div class="details">
    <div class="details-grid" id="details-grid"></div>
    <div class="cap-bar" id="cap-bar"></div>
  </div>
</div>

<script>
var levels = [
  {
    name: '\u6700\u7ec8\u4e00\u81f4\u6027 (Eventual)',
    desc: '\u5199\u5165\u5355\u4e2a\u526f\u672c\u5373\u8fd4\u56de\uff0c\u540e\u53f0\u5f02\u6b65\u590d\u5236\u3002\u6570\u636e\u201c\u6700\u7ec8\u201d\u4f1a\u4e00\u81f4\uff0c\u4f46\u6ca1\u6709\u65f6\u95f4\u4fdd\u8bc1\u3002',
    writeLatency: 15, readFreshness: 20, throughput: 95,
    writeLatencyText: '\u6781\u4f4e', readFreshnessText: '\u53ef\u80fd\u8bfb\u5230\u65e7\u6570\u636e', throughputText: '\u6781\u9ad8',
    example: 'DNS / CDN \u7f13\u5b58 / \u793e\u4ea4\u5a92\u4f53\u70b9\u8d5e\u6570',
    writePath: '\u5199\u5165 1 \u4e2a\u526f\u672c -> ACK -> \u540e\u53f0\u5f02\u6b65\u590d\u5236',
    readRisk: '\u53ef\u80fd\u8bfb\u4e0d\u5230\u81ea\u5df1\u521a\u5199\u7684\u6570\u636e\uff08read-your-own-writes \u95ee\u9898\uff09',
    bestFor: '\u5bf9\u5b9e\u65f6\u6027\u8981\u6c42\u4e0d\u9ad8\u3001\u5141\u8bb8\u77ed\u6682\u4e0d\u4e00\u81f4\u7684\u8bfb\u591a\u5199\u5c11\u573a\u666f',
    cap: { c: false, a: true, p: true },
  },
  {
    name: '\u56e0\u679c\u4e00\u81f4\u6027 (Causal)',
    desc: '\u4fdd\u8bc1\u6709\u56e0\u679c\u5173\u7cfb\u7684\u64cd\u4f5c\u6309\u5e8f\u53ef\u89c1\u3002\u6ca1\u6709\u56e0\u679c\u5173\u7cfb\u7684\u64cd\u4f5c\u53ef\u80fd\u4e71\u5e8f\u3002',
    writeLatency: 30, readFreshness: 45, throughput: 80,
    writeLatencyText: '\u4f4e', readFreshnessText: '\u56e0\u679c\u76f8\u5173\u7684\u6570\u636e\u4e00\u81f4', throughputText: '\u9ad8',
    example: '\u8bc4\u8bba\u7cfb\u7edf\uff08\u5148\u53d1\u5e16\u518d\u56de\u590d\uff0c\u56de\u590d\u4e00\u5b9a\u5728\u5e16\u5b50\u4e4b\u540e\u53ef\u89c1\uff09',
    writePath: '\u8ffd\u8e2a\u56e0\u679c\u4f9d\u8d56\u5411\u91cf\uff0c\u76f8\u5173\u526f\u672c\u540c\u6b65\u590d\u5236',
    readRisk: '\u65e0\u56e0\u679c\u5173\u7cfb\u7684\u6570\u636e\u53ef\u80fd\u77ed\u6682\u4e0d\u4e00\u81f4',
    bestFor: '\u9700\u8981\u4fdd\u8bc1\u64cd\u4f5c\u987a\u5e8f\u4f46\u4e0d\u9700\u8981\u5168\u5c40\u4e00\u81f4\u7684\u573a\u666f',
    cap: { c: false, a: true, p: true },
  },
  {
    name: '\u4f1a\u8bdd\u4e00\u81f4\u6027 (Session)',
    desc: '\u4fdd\u8bc1\u540c\u4e00\u4f1a\u8bdd\u5185 read-your-own-writes\u3002\u4e0d\u540c\u7528\u6237\u4e4b\u95f4\u53ef\u80fd\u770b\u5230\u4e0d\u540c\u7248\u672c\u3002',
    writeLatency: 40, readFreshness: 60, throughput: 70,
    writeLatencyText: '\u4e2d\u4f4e', readFreshnessText: '\u540c\u4e00\u4f1a\u8bdd\u5185\u4e00\u81f4', throughputText: '\u4e2d\u9ad8',
    example: '\u7528\u6237\u4e2a\u4eba\u8bbe\u7f6e / \u8d2d\u7269\u8f66 / \u7535\u5546\u201c\u6211\u7684\u8ba2\u5355\u201d',
    writePath: '\u5199\u5165\u540e\u5c06\u4f1a\u8bdd\u7ed1\u5b9a\u5230\u540c\u4e00\u526f\u672c\uff08sticky session\uff09',
    readRisk: '\u4e0d\u540c\u7528\u6237\u53ef\u80fd\u770b\u5230\u4e0d\u540c\u7248\u672c\u7684\u6570\u636e',
    bestFor: '\u9700\u8981\u7528\u6237\u81ea\u8eab\u64cd\u4f5c\u4e00\u81f4\u6027\u7684\u5178\u578b Web \u5e94\u7528',
    cap: { c: false, a: true, p: true },
  },
  {
    name: '\u6709\u754c\u8fc7\u671f\u4e00\u81f4\u6027 (Bounded Staleness)',
    desc: '\u4fdd\u8bc1\u8bfb\u53d6\u7684\u6570\u636e\u6700\u591a\u843d\u540e N \u79d2\u6216 K \u4e2a\u7248\u672c\u3002\u8d85\u8fc7\u9608\u503c\u5219\u963b\u585e\u6216\u91cd\u5b9a\u5411\u3002',
    writeLatency: 60, readFreshness: 75, throughput: 55,
    writeLatencyText: '\u4e2d', readFreshnessText: '\u6700\u591a\u843d\u540e N \u79d2', throughputText: '\u4e2d',
    example: 'Azure CosmosDB Bounded Staleness / \u91d1\u878d\u884c\u60c5\uff08\u5141\u8bb8 5 \u79d2\u5ef6\u8fdf\uff09',
    writePath: '\u5f02\u6b65\u590d\u5236\u4f46\u8ffd\u8e2a\u5ef6\u8fdf\uff0c\u8d85\u8fc7\u9608\u503c\u5219\u963b\u585e\u8bfb\u53d6',
    readRisk: '\u5728\u9608\u503c\u5185\u53ef\u80fd\u8bfb\u5230\u65e7\u6570\u636e\uff0c\u4f46\u6709\u660e\u786e\u7684\u4e0a\u754c',
    bestFor: '\u9700\u8981\u5728\u4e00\u81f4\u6027\u548c\u6027\u80fd\u4e4b\u95f4\u7cbe\u786e\u63a7\u5236\u6743\u8861\u7684\u573a\u666f',
    cap: { c: true, a: false, p: true },
  },
  {
    name: '\u5f3a\u4e00\u81f4\u6027 (Strong / Linearizable)',
    desc: '\u6240\u6709\u526f\u672c\u786e\u8ba4\u5199\u5165\u540e\u624d\u8fd4\u56de\u3002\u4efb\u4f55\u8bfb\u53d6\u90fd\u4fdd\u8bc1\u8fd4\u56de\u6700\u65b0\u6570\u636e\u3002',
    writeLatency: 95, readFreshness: 100, throughput: 20,
    writeLatencyText: '\u9ad8', readFreshnessText: '\u59cb\u7ec8\u6700\u65b0', throughputText: '\u4f4e',
    example: '\u94f6\u884c\u8f6c\u8d26 / \u5e93\u5b58\u6263\u51cf / \u5206\u5e03\u5f0f\u9501',
    writePath: '\u5199\u5165\u6240\u6709\uff08\u6216 quorum\uff09\u526f\u672c -> \u5168\u90e8 ACK -> \u8fd4\u56de\u6210\u529f',
    readRisk: '\u65e0 \u2014 \u4f46\u5199\u5165\u5ef6\u8fdf\u548c\u5931\u8d25\u7387\u663e\u8457\u589e\u52a0',
    bestFor: '\u6570\u636e\u7edd\u5bf9\u4e0d\u80fd\u4e0d\u4e00\u81f4\u7684\u5173\u952e\u4e1a\u52a1\u573a\u666f',
    cap: { c: true, a: false, p: true },
  },
];

var currentLevel = 0;

function render() {
  var l = levels[currentLevel];
  var pct = currentLevel / 4;
  var colorVar = pct < 0.3 ? 'var(--green)' : pct < 0.7 ? 'var(--yellow)' : 'var(--red)';

  document.getElementById('level-label').style.color = colorVar;
  document.getElementById('level-label').textContent = l.name;
  document.getElementById('level-desc').textContent = l.desc;

  var metricsData = [
    { label: '\u5199\u5165\u5ef6\u8fdf', value: l.writeLatency, text: l.writeLatencyText, color: l.writeLatency > 60 ? 'var(--red)' : l.writeLatency > 35 ? 'var(--yellow)' : 'var(--green)' },
    { label: '\u8bfb\u53d6\u65b0\u9c9c\u5ea6', value: l.readFreshness, text: l.readFreshnessText, color: l.readFreshness > 70 ? 'var(--green)' : l.readFreshness > 40 ? 'var(--yellow)' : 'var(--red)' },
    { label: '\u541e\u5410\u91cf', value: l.throughput, text: l.throughputText, color: l.throughput > 70 ? 'var(--green)' : l.throughput > 40 ? 'var(--yellow)' : 'var(--red)' },
  ];

  document.getElementById('metrics').innerHTML = metricsData.map(function(m) {
    return '<div class="metric">' +
      '<div class="metric-label">' + m.label + '</div>' +
      '<div class="metric-bar-bg"><div class="metric-bar-fill" style="width:' + m.value + '%; background:' + m.color + ';"></div></div>' +
      '<div class="metric-value" style="color:' + m.color + '">' + m.text + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('details-grid').innerHTML =
    '<div class="detail-card"><div class="detail-label">\u5199\u5165\u8def\u5f84</div><div class="detail-value">' + l.writePath + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">\u8bfb\u53d6\u98ce\u9669</div><div class="detail-value">' + l.readRisk + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">\u5178\u578b\u573a\u666f</div><div class="detail-value">' + l.example + '</div></div>' +
    '<div class="detail-card"><div class="detail-label">\u6700\u9002\u7528\u4e8e</div><div class="detail-value">' + l.bestFor + '</div></div>';

  var capItems = [
    { key: 'c', label: 'Consistency' },
    { key: 'a', label: 'Availability' },
    { key: 'p', label: 'Partition Tolerance' },
  ];
  document.getElementById('cap-bar').innerHTML =
    '<div class="cap-label">CAP \u5b9a\u7406\u6743\u8861</div>' +
    '<div class="cap-items">' +
      capItems.map(function(c) {
        return '<span class="cap-item ' + (l.cap[c.key] ? 'cap-on' : 'cap-off') + '">' + c.label + '</span>';
      }).join('') +
    '</div>';
}

var slider = document.getElementById('slider');
slider.addEventListener('input', function() {
  currentLevel = parseInt(this.value);
  render();
});

function syncTheme() {
  try {
    var html = window.parent.document.documentElement;
    var isDark = html.classList.contains('dark');
    document.body.classList.toggle('light', !isDark);
  } catch(e) {}
  render();
}
syncTheme();
try { new MutationObserver(syncTheme).observe(window.parent.document.documentElement, { attributes: true, attributeFilter: ['class'] }); } catch(e) {}
</script>
</body>
</html>
