<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #1e1e2e; color: #cdd6f4; padding: 16px; min-height: 100%; }

  .title { font-size: 14px; font-weight: 700; color: #cdd6f4; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #6c7086; margin-bottom: 20px; }

  .diagram { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }

  /* Flow diagram */
  .flow { display: flex; flex-direction: column; align-items: center; gap: 0; min-width: 180px; }
  .flow-title { font-size: 11px; color: #89b4fa; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }

  .node {
    padding: 8px 20px; border-radius: 10px; font-size: 11px; font-weight: 600;
    text-align: center; cursor: pointer; transition: all .2s; position: relative;
    border: 2px solid transparent; min-width: 150px;
  }
  .node:hover { filter: brightness(1.2); }
  .node.active { box-shadow: 0 0 0 3px rgba(137,180,250,0.5); }

  .node-input  { background: rgba(137,180,250,0.15); border-color: #89b4fa; color: #89b4fa; }
  .node-ln     { background: rgba(203,166,247,0.15); border-color: #cba6f7; color: #cba6f7; }
  .node-attn   { background: rgba(250,179,135,0.15); border-color: #fab387; color: #fab387; }
  .node-add    { background: rgba(166,227,161,0.15); border-color: #a6e3a1; color: #a6e3a1; }
  .node-ffn    { background: rgba(243,139,168,0.15); border-color: #f38ba8; color: #f38ba8; }
  .node-output { background: rgba(137,180,250,0.15); border-color: #89b4fa; color: #89b4fa; }

  .arrow-down {
    width: 2px; height: 18px; background: #45475a; margin: 0 auto; position: relative;
  }
  .arrow-down::after {
    content: '▼'; position: absolute; bottom: -10px; left: 50%;
    transform: translateX(-50%); font-size: 9px; color: #45475a;
  }

  .residual-label {
    font-size: 9px; color: #a6e3a1; position: absolute; right: -52px; top: 50%;
    transform: translateY(-50%); white-space: nowrap;
  }

  /* Detail panel */
  .detail { flex: 1; min-width: 220px; }
  .detail-title { font-size: 11px; color: #89b4fa; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }
  .detail-card {
    background: #181825; border: 1px solid #313244; border-radius: 10px;
    padding: 14px; min-height: 180px;
  }
  .detail-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
  .detail-desc { font-size: 11px; color: #a6adc8; line-height: 1.6; margin-bottom: 10px; }
  code { background: #313244; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
  .code-block {
    background: #11111b; border-radius: 8px; padding: 10px 12px;
    font-size: 10px; color: #a6adc8; line-height: 1.7; overflow-x: auto;
  }
  .kw { color: #cba6f7; }
  .fn { color: #89b4fa; }
  .cm { color: #6c7086; }

  /* Multi-head attention expansion */
  .heads-grid {
    display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
  }
  .head-box {
    background: rgba(250,179,135,0.1); border: 1px solid rgba(250,179,135,0.3);
    border-radius: 6px; padding: 4px 8px; font-size: 9px; color: #fab387; text-align: center;
  }

  .hint { font-size: 10px; color: #585b70; text-align: center; margin-top: 12px; }
</style>
</head>
<body>
<div class="title">Transformer Block — 交互式结构图</div>
<div class="subtitle">点击各组件查看详细说明和对应代码</div>

<div class="diagram">
  <!-- Flow diagram -->
  <div class="flow">
    <div class="flow-title">数据流</div>

    <div class="node node-input" id="n-input" onclick="showDetail('input')">
      x &nbsp;(B, T, n_embd)
    </div>
    <div class="arrow-down"></div>

    <div style="position:relative; display:flex; flex-direction:column; align-items:center; width:100%;">
      <div class="node node-ln" id="n-ln1" onclick="showDetail('ln1')" style="z-index:1;">
        LayerNorm (ln1)
      </div>
      <div class="arrow-down"></div>
      <div class="node node-attn" id="n-attn" onclick="showDetail('attn')">
        Multi-Head Attention
        <div class="heads-grid" id="heads-preview"></div>
      </div>
      <div class="arrow-down"></div>
      <div class="node node-add" id="n-add1" onclick="showDetail('add1')" style="position:relative;">
        + 残差连接
        <span class="residual-label">← x</span>
      </div>
    </div>

    <div class="arrow-down"></div>

    <div style="position:relative; display:flex; flex-direction:column; align-items:center; width:100%;">
      <div class="node node-ln" id="n-ln2" onclick="showDetail('ln2')">
        LayerNorm (ln2)
      </div>
      <div class="arrow-down"></div>
      <div class="node node-ffn" id="n-ffn" onclick="showDetail('ffn')">
        Feed-Forward Network
      </div>
      <div class="arrow-down"></div>
      <div class="node node-add" id="n-add2" onclick="showDetail('add2')" style="position:relative;">
        + 残差连接
        <span class="residual-label">← x</span>
      </div>
    </div>

    <div class="arrow-down"></div>
    <div class="node node-output" id="n-output" onclick="showDetail('output')">
      x &nbsp;(B, T, n_embd)
    </div>
  </div>

  <!-- Detail panel -->
  <div class="detail">
    <div class="detail-title">组件详情</div>
    <div class="detail-card" id="detail-card">
      <div class="detail-name" style="color:#6c7086;">← 点击左侧任意组件</div>
      <div class="detail-desc" style="color:#45475a;">查看该组件的说明、数据形状变化和对应代码</div>
    </div>
  </div>
</div>

<div class="hint">Transformer Block 由两个子层组成，每个子层都有 Pre-LayerNorm 和残差连接</div>

<script>
const N_HEAD = 6, N_EMBD = 384;

// Build heads preview
const headsPreview = document.getElementById('heads-preview');
for (let i = 0; i < N_HEAD; i++) {
  const h = document.createElement('div');
  h.className = 'head-box';
  h.textContent = `H${i+1}`;
  headsPreview.appendChild(h);
}

const details = {
  input: {
    name: 'Input x',
    color: '#89b4fa',
    desc: 'Transformer Block 的输入：来自前一层（或 token+位置 embedding 之和）的表示向量。',
    shapes: '(B, T, n_embd) = (64, 256, 384)',
    code: `<span class="cm"># token + position embedding</span>\ntok_emb = token_embedding_table(idx)   <span class="cm"># (B,T,C)</span>\npos_emb = position_embedding_table(t)   <span class="cm"># (T,C)</span>\nx = tok_emb + pos_emb`
  },
  ln1: {
    name: 'LayerNorm (ln1)',
    color: '#cba6f7',
    desc: 'Pre-LayerNorm：在进入 Attention 之前对特征维度归一化（均值0，方差1）。比 Post-LN 训练更稳定。',
    shapes: '(B, T, 384) → (B, T, 384)，形状不变',
    code: `self.ln1 = <span class="fn">nn.LayerNorm</span>(n_embd)\n\n<span class="cm"># 调用：</span>\nself.ln1(x)   <span class="cm"># 对最后一维(384)归一化</span>`
  },
  attn: {
    name: 'Multi-Head Attention (6 heads)',
    color: '#fab387',
    desc: `并行运行 ${N_HEAD} 个独立 Attention Head，每个 head_size=${N_EMBD/N_HEAD}。各 head 学习不同的关注模式，拼接后投影回 n_embd。`,
    shapes: `(B,T,384) → [6×(B,T,64)] concat → (B,T,384)`,
    code: `<span class="kw">class</span> <span class="fn">MultiHeadAttention</span>(nn.Module):\n  <span class="kw">def</span> <span class="fn">forward</span>(self, x):\n    out = torch.cat([h(x) <span class="kw">for</span> h <span class="kw">in</span> self.heads], dim=-1)\n    <span class="cm"># (B,T,384)</span>\n    <span class="kw">return</span> self.proj(out)`
  },
  add1: {
    name: '残差连接 (Residual)',
    color: '#a6e3a1',
    desc: '将 Attention 的输出与原始输入直接相加。残差连接让梯度在反向传播时能直接流过，是训练深层网络的关键。',
    shapes: '(B,T,384) + (B,T,384) → (B,T,384)',
    code: `<span class="cm"># x 是 Block 的输入，保留原始值</span>\nx = x + self.sa(self.ln1(x))\n<span class="cm"># ↑ self.sa 的输出加回到原始 x 上</span>`
  },
  ln2: {
    name: 'LayerNorm (ln2)',
    color: '#cba6f7',
    desc: '第二个 Pre-LayerNorm，在进入 FFN 之前归一化。每个子层前都有独立的 LayerNorm。',
    shapes: '(B, T, 384) → (B, T, 384)',
    code: `self.ln2 = <span class="fn">nn.LayerNorm</span>(n_embd)\n\n<span class="cm"># 调用：</span>\nself.ln2(x)   <span class="cm"># FFN 前归一化</span>`
  },
  ffn: {
    name: 'Feed-Forward Network',
    color: '#f38ba8',
    desc: 'Attention 负责 token 之间的通信，FFN 负责每个 token 内部的计算。中间扩展到 4×n_embd，增加容量。',
    shapes: '(B,T,384) → (B,T,1536) → (B,T,384)',
    code: `<span class="fn">nn.Sequential</span>(\n  <span class="fn">nn.Linear</span>(384, 1536),  <span class="cm"># 4× 扩展</span>\n  <span class="fn">nn.ReLU</span>(),\n  <span class="fn">nn.Linear</span>(1536, 384), <span class="cm"># 压缩回来</span>\n  <span class="fn">nn.Dropout</span>(0.2),\n)`
  },
  add2: {
    name: '残差连接 (Residual)',
    color: '#a6e3a1',
    desc: '第二个残差连接，将 FFN 输出与 FFN 之前的 x 相加。两个残差连接共同构成了 Transformer Block 的核心结构。',
    shapes: '(B,T,384) + (B,T,384) → (B,T,384)',
    code: `x = x + self.ffwd(self.ln2(x))\n<span class="cm"># ↑ 完整的 Block forward：</span>\n<span class="cm"># x = x + attention(ln1(x))</span>\n<span class="cm"># x = x + ffn(ln2(x))</span>`
  },
  output: {
    name: 'Output x',
    color: '#89b4fa',
    desc: '经过一个 Block 后的输出，形状与输入完全相同。6 个 Block 串联堆叠，最终由 ln_f + lm_head 输出词表 logits。',
    shapes: '(B, T, n_embd) = (64, 256, 384)',
    code: `<span class="cm"># 6 个 Block 串联（n_layer=6）：</span>\nself.blocks = <span class="fn">nn.Sequential</span>(\n  *[Block(n_embd, n_head) <span class="kw">for</span> _ <span class="kw">in</span> range(6)]\n)\n\nx = self.blocks(x)  <span class="cm"># 顺序通过 6 层</span>`
  }
};

let activeNode = null;

function showDetail(key) {
  // Deactivate old
  if (activeNode) {
    document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
  }

  const d = details[key];
  if (!d) return;

  const nodeId = {
    input: 'n-input', ln1: 'n-ln1', attn: 'n-attn', add1: 'n-add1',
    ln2: 'n-ln2', ffn: 'n-ffn', add2: 'n-add2', output: 'n-output'
  }[key];
  if (nodeId) document.getElementById(nodeId)?.classList.add('active');
  activeNode = key;

  document.getElementById('detail-card').innerHTML = `
    <div class="detail-name" style="color:${d.color}">${d.name}</div>
    <div class="detail-desc">${d.desc}</div>
    <div style="font-size:10px;color:#585b70;margin-bottom:6px;">形状：<code>${d.shapes}</code></div>
    <div class="code-block">${d.code}</div>
  `;
}

// Default selection
showDetail('attn');
</script>
</body>
</html>
